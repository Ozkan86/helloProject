name: .NET MVC CI/CD

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on:
      - self-hosted
      - Linux
      - X64

    steps:
      - uses: actions/checkout@v4

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --no-build --configuration Release

      - name: Publish
        run: dotnet publish -c Release -o publish

      - name: Upload Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish
          path: publish/

  deploy:
    needs: build

    runs-on:
      - self-hosted
      - Linux
      - X64

    environment:
      name: production

    steps:

      - name: Download Publish Artifact
        uses: actions/download-artifact@v4
        with:
          name: publish
          path: publish

      - name: Copy Publish to Production Server
        run: |
          ssh user@192.168.68.50 "mkdir -p /home/user/apps/helloProject/incoming"
          scp -r publish/* user@192.168.68.50:/home/user/apps/helloProject/incoming/

      - name: Run Blue-Green Deployment
        run: |
          ssh user@192.168.68.50 "/home/user/apps/helloProject/deploy.sh"